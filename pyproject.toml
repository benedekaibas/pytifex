[project]
name = "pytifex"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "mypy==1.19.0",
    "pyrefly==0.44.2",
    "zuban==0.3.0",
    "ty==0.0.1-alpha.32",
    "pydantic",
    "httpx",
]

[project.scripts]
pytifex-demo = "src.code:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

